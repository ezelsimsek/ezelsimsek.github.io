<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jane Doe | Portfolio & Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="site.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light py-4">
        <div class="container m-auto max-width-750" style="max-width: 800px;">
            <a class="navbar-brand fw-bold text-dark" href="#" onclick="navigate('home')">JD.</a>
            <div class="ms-auto">
                <ul class="navbar-nav flex-row gap-4">
                    <li class="nav-item"><a class="nav-link active" href="#" id="nav-home" onclick="navigate('home')">Anasayfa</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="nav-projects" onclick="navigate('projects')">Projeler</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="nav-blog" onclick="navigate('blog')">Blog</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5" style="max-width: 800px;">
        
        <section id="home" class="spa-section active">
            <div class="row align-items-center py-4">
                <div class="col-md-8 order-2 order-md-1">
                    <h1 class="display-5 fw-bold mb-2" id="profile-name">Loading...</h1>
                    <p class="lead text-muted mb-4" id="profile-title"></p>
                    <p class="mb-4" id="profile-bio"></p>
                    <div class="d-flex gap-3 fs-4" id="profile-socials">
                        </div>
                </div>
                <div class="col-md-4 order-1 order-md-2 text-center mb-4 mb-md-0">
                    <img id="profile-avatar" src="" alt="Avatar" class="img-fluid rounded-circle shadow-sm" style="width: 150px; height: 150px; object-fit: cover;">
                </div>
            </div>
        </section>

        <section id="projects" class="spa-section">
            <h2 class="fw-bold mb-4">Projeler</h2>
            <div class="row g-4" id="projects-container">
                </div>
        </section>

        <section id="blog" class="spa-section">
            <h2 class="fw-bold mb-4">Blog Yazıları</h2>
            <div class="d-flex flex-column gap-4" id="blog-container">
                </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let appData = {};

        // Fetch JSON Data
        async function loadData() {
            try {
                const response = await fetch('data.json');
                appData = await response.json();
                renderProfile();
                renderProjects();
                renderBlog();
            } catch (error) {
                console.error("Veri yüklenirken hata oluştu:", error);
            }
        }

        // Render Profile
        function renderProfile() {
            document.getElementById('profile-name').innerText = appData.profile.name;
            document.getElementById('profile-title').innerText = appData.profile.title;
            document.getElementById('profile-bio').innerText = appData.profile.bio;
            document.getElementById('profile-avatar').src = appData.profile.avatar;

            const socials = appData.profile.socials;
            document.getElementById('profile-socials').innerHTML = `
                <a href="${socials.github}" class="text-secondary"><i class="fa-brands fa-github"></i></a>
                <a href="${socials.linkedin}" class="text-secondary"><i class="fa-brands fa-linkedin"></i></a>
                <a href="${socials.twitter}" class="text-secondary"><i class="fa-brands fa-x-twitter"></i></a>
            `;
        }

        // Render Projects
        function renderProjects() {
            const container = document.getElementById('projects-container');
            container.innerHTML = appData.projects.map(project => `
                <div class="col-md-6">
                    <div class="card project-card h-100 p-4">
                        <div class="card-body d-flex flex-column p-0">
                            <h3 class="h5 fw-bold mb-2">${project.title}</h3>
                            <p class="text-muted small flex-grow-1">${project.description}</p>
                            <a href="${project.link}" class="text-dark fw-semibold text-decoration-none mt-3 small">Incele <i class="fa-solid fa-arrow-right ms-1"></i></a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Render Blog
        function renderBlog() {
            const container = document.getElementById('blog-container');
            container.innerHTML = appData.blog.map(post => `
                <article class="card blog-card p-4">
                    <div class="card-body p-0">
                        <span class="text-muted small d-block mb-1">${post.date}</span>
                        <h3 class="h5 fw-bold mb-2">${post.title}</h3>
                        <p class="text-muted small mb-0">${post.excerpt}</p>
                    </div>
                </article>
            `).join('');
        }

        // SPA Routing Logic
        function navigate(sectionId) {
            // Toggle sections
            document.querySelectorAll('.spa-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(sectionId).classList.add('active');

            // Toggle nav links active state
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
            });
            document.getElementById(`nav-${sectionId}`).classList.add('active');
        }

        // Init
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
